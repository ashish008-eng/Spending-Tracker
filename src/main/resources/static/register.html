<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Spending Tracker</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div class="container">
        <h1>Create Account</h1>
        
        <!-- Message display area for success/error feedback -->
        <div id="message" class="message"></div>
        
        <!-- Registration form -->
        <form id="registerForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="Enter your username" 
                    required
                    minlength="3"
                >
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="Enter your email" 
                    required
                >
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-input-container">
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter your password" 
                        required
                        minlength="6"
                    >
                    <button type="button" class="password-toggle" onclick="togglePassword('password', 'passwordToggleIcon')">
                        <i class="fas fa-eye" id="passwordToggleIcon"></i>
                    </button>
                </div>
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <div class="password-input-container">
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword" 
                        placeholder="Confirm your password" 
                        required
                    >
                    <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword', 'confirmPasswordToggleIcon')">
                        <i class="fas fa-eye" id="confirmPasswordToggleIcon"></i>
                    </button>
                </div>
            </div>
            
            <button type="submit" class="btn" id="submitBtn">
                Register
            </button>
        </form>
        
        <!-- Google Sign-In Button -->
        <div class="divider">
            <span>OR</span>
        </div>
        
        <div id="g_id_onload"
             data-client_id="597004127256-sb4a6j2c80h4o45d7ueadfei2g9v2m6o.apps.googleusercontent.com"
             data-callback="handleGoogleSignUp"
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin"
             data-type="standard"
             data-size="large"
             data-theme="outline"
             data-text="signup_with"
             data-shape="rectangular"
             data-logo_alignment="left">
        </div>
        
        <!-- Link to login page for existing users -->
        <div class="link-text">
            Already have an account? <a href="login.html">Login here</a>
        </div>
    </div>
    
    <script src="script.js"></script>
    <script>
        // Handle registration form submission
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // Prevent default form submission
            
            // Get form values
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Get message element
            const messageEl = document.getElementById('message');
            const submitBtn = document.getElementById('submitBtn');
            
            // Validate passwords match
            if (password !== confirmPassword) {
                showMessage(messageEl, 'Passwords do not match!', 'error');
                return;
            }
            
            // Validate email format
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showMessage(messageEl, 'Please enter a valid email address!', 'error');
                return;
            }
            
            // Validate password strength
            if (password.length < 6) {
                showMessage(messageEl, 'Password must be at least 6 characters long!', 'error');
                return;
            }
            
            // Show loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span> Registering...';
            
            try {
                // Call the registration API
                const response = await fetch(`${API_BASE_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        email: email,
                        password: password
                    })
                });
                
                // Get response text first
                const responseText = await response.text();
                
                // Try to parse as JSON, otherwise use as plain text
                let data;
                try {
                    data = JSON.parse(responseText);
                } catch (e) {
                    // Response is not JSON, use the text as message
                    data = { message: responseText };
                }
                
                if (response.ok) {
                    // Registration successful
                    showMessage(messageEl, 'Registration successful! Redirecting to login...', 'success');
                    
                    // Redirect to login page after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    // Registration failed - show error message from server
                    showMessage(messageEl, data.message || 'Registration failed. Please try again.', 'error');
                }
            } catch (error) {
                // Handle network errors or other issues
                console.error('Registration error:', error);
                showMessage(messageEl, 'Connection error. Please ensure the server is running.', 'error');
            } finally {
                // Reset button state
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Register';
            }
        });
        
        // Handle Google Sign-Up
        async function handleGoogleSignUp(response) {
            const messageEl = document.getElementById('message');
            const submitBtn = document.getElementById('submitBtn');
            
            try {
                // Show loading state
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="loading"></span> Registering...';
                
                // Decode Google JWT to get user info
                const userInfo = JSON.parse(atob(response.credential.split('.')[1]));
                
                // Send the Google JWT token to backend for registration
                const fetchResponse = await fetch(`${API_BASE_URL}/api/auth/google`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        token: response.credential,
                        username: userInfo.email.split('@')[0],
                        email: userInfo.email,
                        name: userInfo.name
                    })
                });
                
                const responseText = await fetchResponse.text();
                let data;
                
                try {
                    data = JSON.parse(responseText);
                } catch (e) {
                    data = { message: responseText };
                }
                
                if (fetchResponse.ok) {
                    showMessage(messageEl, 'Registration successful! Please login.', 'success');
                    
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    showMessage(messageEl, data.message || 'Registration failed. Please try again.', 'error');
                }
            } catch (error) {
                console.error('Google registration error:', error);
                showMessage(messageEl, 'Connection error. Please ensure the server is running.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Register';
            }
        }
        
        // Helper function to show messages
        function showMessage(element, text, type) {
            element.textContent = text;
            element.className = `message ${type}`;
            element.style.display = 'block';
            
            // Auto-hide after 5 seconds
            setTimeout(() => {
                element.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
