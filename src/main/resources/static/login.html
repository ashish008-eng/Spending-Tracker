<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Spending Tracker</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div class="container">
        <h1>Welcome Back</h1>
        
        <!-- Message display area for success/error feedback -->
        <div id="message" class="message"></div>
        
        <!-- Login form -->
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="Enter your username" 
                    required
                    autocomplete="username"
                >
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-input-container">
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter your password" 
                        required
                        autocomplete="current-password"
                    >
                    <button type="button" class="password-toggle" onclick="togglePassword('password', 'passwordToggleIcon')">
                        <i class="fas fa-eye" id="passwordToggleIcon"></i>
                    </button>
                </div>
            </div>
            
            <button type="submit" class="btn" id="submitBtn">
                Login
            </button>
        </form>
        
        <!-- Google Sign-In Button -->
        <div class="divider">
            <span>OR</span>
        </div>
        
        <div id="g_id_onload"
             data-client_id="597004127256-sb4a6j2c80h4o45d7ueadfei2g9v2m6o.apps.googleusercontent.com"
             data-callback="handleGoogleSignIn"
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin"
             data-type="standard"
             data-size="large"
             data-theme="outline"
             data-text="signin_with"
             data-shape="rectangular"
             data-logo_alignment="left">
        </div>
        
        <!-- Link to registration page for new users -->
        <div class="link-text">
            Don't have an account? <a href="register.html">Register here</a>
        </div>
    </div>
    
    <script src="script.js"></script>
    <script>
        // Check if user is already logged in
        // If yes, redirect to dashboard immediately
        if (localStorage.getItem('jwtToken')) {
            window.location.href = 'dashboard.html';
        }
        
        // Handle login form submission
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // Prevent default form submission
            
            // Get form values
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            // Get message element
            const messageEl = document.getElementById('message');
            const submitBtn = document.getElementById('submitBtn');
            
            // Show loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span> Logging in...';
            
            try {
                // Call the login API
                const response = await fetch(`${BASE_URL}/api/auth/login`, ... {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: username,
                        password: password
                    })
                });
                
                // Get response text first
                // const responseText = await response.text();
                
                // // Try to parse as JSON, otherwise use as plain text
                // let data;
                // try {
                //     data = JSON.parse(responseText);
                // } catch (e) {
                //     // Response is not JSON, use the text as message
                //     data = { message: responseText };
                // }


                const responseText = await response.text();

                let token;

                // check if it's JSON
                try {
                    const data = JSON.parse(responseText);
                    token = data.token || data.jwt || data.accessToken;
                } catch (e) {
                    // 🔥 direct string token case
                    token = responseText;
                }
                
                // if (response.ok) {
                //     // Login successful
                //     // Store JWT token in localStorage
                //     // The API might return the token in different formats:
                //     // - { token: "..." }
                //     // - { jwt: "..." }
                //     // - { accessToken: "..." }
                //     const token = data.token || data.jwt || data.accessToken;
                    
                //     if (token) {
                //         localStorage.setItem('jwtToken', token);
                        
                //         // Show success message
                //         showMessage(messageEl, 'Login successful! Redirecting...', 'success');
                        
                //         // Redirect to dashboard after 1 second
                //         setTimeout(() => {
                //             window.location.href = 'dashboard.html';
                //         }, 1000);
                //     } else {
                //         // Token not found in response
                //         showMessage(messageEl, 'Login successful but no token received.', 'error');
                //     }
               // }
                if (response.ok) {
                    if (token) {
                        localStorage.setItem('jwtToken', token);
                        // Store username for welcome message
                        localStorage.setItem('username', username);

                        showMessage(messageEl, 'Login successful! Redirecting...', 'success');

                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 1000);
                    } else {
                        showMessage(messageEl, 'Login successful but no token received.', 'error');
                    }
                }
                
                
                
                else {
                    // Login failed - show error message from server
                    showMessage(messageEl, data.message || 'Invalid username or password.', 'error');
                }
            } catch (error) {
                // Handle network errors or other issues
                console.error('Login error:', error);
                showMessage(messageEl, 'Connection error. Please ensure the server is running.', 'error');
            } finally {
                // Reset button state
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Login';
            }
        });
        
        // Handle Google Sign-In
        async function handleGoogleSignIn(response) {
            const messageEl = document.getElementById('message');
            const submitBtn = document.getElementById('submitBtn');
            
            try {
                // Show loading state
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="loading"></span> Signing in...';
                
                // Send the Google JWT token to backend for authentication
                const fetchResponse = await fetch(`${BASE_URL}/api/auth/google`, ... {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        token: response.credential
                    })
                });
                
                const responseText = await fetchResponse.text();
                let token;
                
                try {
                    const data = JSON.parse(responseText);
                    token = data.token || data.jwt || data.accessToken;
                } catch (e) {
                    token = responseText;
                }
                
                if (fetchResponse.ok && token) {
                    localStorage.setItem('jwtToken', token);
                    // Extract email from decoded JWT or use Google response
                    const userInfo = JSON.parse(atob(response.credential.split('.')[1]));
                    localStorage.setItem('username', userInfo.email.split('@')[0]);
                    
                    showMessage(messageEl, 'Google login successful! Redirecting...', 'success');
                    
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else {
                    showMessage(messageEl, 'Google login failed. Please try again.', 'error');
                }
            } catch (error) {
                console.error('Google login error:', error);
                showMessage(messageEl, 'Connection error. Please ensure the server is running.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Login';
            }
        }
        
        // Helper function to show messages
        function showMessage(element, text, type) {
            element.textContent = text;
            element.className = `message ${type}`;
            element.style.display = 'block';
            
            // Auto-hide after 5 seconds
            setTimeout(() => {
                element.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
